name: Code Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check formatting (ktlint)
        run: ./gradlew ktlintCheck

      - name: Run tests and generate Kover coverage report
        run: ./gradlew :popp-sdk:testAndroidHostTest :popp-demo:shared:testAndroidHostTest :koverXmlReport :koverHtmlReport

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            popp-sdk/build/reports/tests/
            popp-sdk/build/test-results/
            popp-demo/shared/build/reports/tests/
            popp-demo/shared/build/test-results/

      - name: Upload Kover HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-html-report
          path: build/reports/kover/html/

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v4
        with:
          files: build/reports/kover/report.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}